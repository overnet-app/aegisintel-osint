services:
  caddy-fix:
    image: docker.io/library/caddy:2-alpine
    container_name: caddy-fix
    volumes:
      - .:/workspace:rw
    command:
      - sh
      - -c
      - |
        if [ -d /workspace/Caddyfile ]; then
          echo 'Removing Caddyfile directory...';
          rm -rf /workspace/Caddyfile;
        fi;
        if [ ! -f /workspace/Caddyfile ]; then
          echo 'Creating Caddyfile...';
          cat > /workspace/Caddyfile << 'CADDYEOF'
        {
            # Global options block
            auto_https off
            local_certs
        }

        # SearXNG reverse proxy
        localhost {
            reverse_proxy 127.0.0.1:8080 {
                header_up Host {host}
                header_up X-Real-IP {remote}
                header_up X-Forwarded-For {remote}
                header_up X-Forwarded-Proto {scheme}
            }
        }
        CADDYEOF
          chmod 644 /workspace/Caddyfile;
          echo 'Caddyfile created successfully';
        fi
    profiles:
      - fix

  caddy:
    container_name: caddy
    image: docker.io/library/caddy:2-alpine
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data:rw
      - caddy-config:/config:rw
    environment:
      - SEARXNG_HOSTNAME=${SEARXNG_HOSTNAME:-http://localhost}
      - SEARXNG_TLS=${LETSENCRYPT_EMAIL:-internal}
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  redis:
    container_name: redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    networks:
      - searxng
    volumes:
      - valkey-data2:/data
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    networks:
      - searxng
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
      - searxng-data:/var/cache/searxng:rw
    environment:
      - SEARXNG_BASE_URL=https://${SEARXNG_HOSTNAME:-localhost}/
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

networks:
  searxng:

volumes:
  caddy-data:
  caddy-config:
  valkey-data2:
  searxng-data:
